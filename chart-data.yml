name: Chart Data Update
on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"
jobs:
  update-chart-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run chart data update
        env:
          ERCOT_USERNAME: ${{ secrets.ERCOT_USERNAME }}
          ERCOT_PASSWORD: ${{ secrets.ERCOT_PASSWORD }}
          ERCOT_SUBKEY: ${{ secrets.ERCOT_SUBKEY }}
        run: python3 chart_briefing.py
      - name: Commit results
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add chart_data.json
          git diff --staged --quiet || git commit -m "Chart data update $(date)"
          git push
