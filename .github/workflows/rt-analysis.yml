name: RT Dispatch Analysis
on:
  workflow_dispatch:
jobs:
  run-rt-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run RT analysis
        env:
          ERCOT_USERNAME: ${{ secrets.ERCOT_USERNAME }}
          ERCOT_PASSWORD: ${{ secrets.ERCOT_PASSWORD }}
          ERCOT_SUBKEY: ${{ secrets.ERCOT_SUBKEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 rt_briefing.py
      - name: Commit results
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add rt.html
          git diff --staged --quiet || git commit -m "RT analysis $(date)"
          git push
